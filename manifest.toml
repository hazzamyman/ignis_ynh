#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "ignis"
name = "Ignis"
description.en = "Run your own Obsidian vault in the browser, behind YunoHost SSO"
description.fr = "Utilisez votre coffre Obsidian dans le navigateur, derrière le SSO YunoHost"

version = "0.8.8~ynh1"

maintainers = ["Harry Nolan-Holmes"]

[upstream]
license = "AGPL-3.0-only"
website = "https://ignis-demo.thiefling.com"
code = "https://github.com/Nystik-gh/ignis"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
# Ignis builds and runs pure JS (esbuild/svelte, no native modules); the Obsidian
# asset it downloads is a platform-independent .asar, so the package is arch-neutral.
architectures = "all"
multi_instance = true

# Ignis has no LDAP integration and no auto-login: it has no auth of its own and
# sits entirely behind SSOwat, which is the only thing protecting the vault.
ldap = false
sso = false

disk = "700M"
ram.build = "700M"
ram.runtime = "256M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    # Ignis serves its API, assets and WebSocket from root-absolute paths, so it is
    # designed to live at a domain root. Subpath installs are not supported in v1.
    type = "path"
    default = "/"

    [install.init_main_permission]
    # Ignis ships NO authentication. SSOwat is the sole access control in front of
    # the vault, so the permission must never be opened to visitors. Default to
    # logged-in YunoHost users.
    type = "group"
    default = "all_users"

[resources]
    [resources.sources.main]
    url = "https://github.com/Nystik-gh/ignis/archive/refs/tags/v0.8.8+obsidian.1.12.7.tar.gz"
    sha256 = "1e9eb4d5906a6ca7b522fc8486e7cf079e5078ebe276e8d9bc433e3f20f4ca35"
    autoupdate.strategy = "latest_github_tag"
    # Upstream tags look like "v0.8.8+obsidian.1.12.7"; keep only the semver for $version.
    autoupdate.version_regex = '^v(\d+\.\d+\.\d+)'

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]
    # Holds vaults/ (VAULT_ROOT), data/ (DATA_ROOT: plugin + sync state), and
    # obsidian-app/ (downloaded Obsidian assets, kept here so upgrades don't re-download).

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    # Internal reverse-proxy port for the single Node service; never exposed publicly.

    [resources.nodejs]
    version = "22"
