location __PATH__/ {

  # Single Node process serves the SPA, the API, static assets and the WebSocket.
  proxy_pass http://127.0.0.1:__PORT__/;
  proxy_redirect off;

  # Live cross-tab sync relies on WebSocket upgrades on this same location.
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $http_connection;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Long-lived WebSocket connections must not be reaped mid-session.
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;

  # Ignis supports large file uploads and folder-as-ZIP downloads.
  client_max_body_size 512M;
  proxy_request_buffering off;

  # Access is enforced by the app's SSOwat permission; Ignis has no auth of its own.
}
